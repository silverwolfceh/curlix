<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curlix - Capture.Rebuild.Replay</title>
  <link rel="icon" type="image/png" href="favicon.png?v=2" />
  <link rel="stylesheet" href="style.css?v=8" />
</head>
<body>
  <header>
    <span class="logo"><img src="logo.png" alt="Curlix" class="logo-img" />Capture - Rebuild - Replay</span>
    <div class="header-actions">
      <button class="btn-small" id="admin-btn" style="display:none" title="Admin panel">&#128274; Admin</button>
      <button class="btn-small" onclick="saveRequest()">&#128190; Save</button>
      <button class="btn-small" onclick="exportAll()">&#8595; Export</button>
      <label class="btn-small" style="cursor:pointer">&#8593; Import<input type="file" id="import-file" accept=".json" style="display:none" onchange="importFile(this)"/></label>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">🌙</button>
      <button class="btn-small" onclick="openSettingsTab()" title="Settings">&#9881; Settings</button>
    </div>
  </header>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <button id="sidebar-toggle" onclick="toggleSidebar()" title="Hide sidebar">◀</button>
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-stab="requests">Requests</button>
        <button class="sidebar-tab" data-stab="history">History</button>
        <button class="sidebar-tab" data-stab="env">Env</button>
      </div>

      <div id="stab-requests" class="sidebar-panel active">
        <div id="saved-list"></div>
      </div>

      <div id="stab-history" class="sidebar-panel">
        <button class="btn-small env-add-btn" onclick="clearHistory()">Clear history</button>
        <div id="history-list"></div>
      </div>

      <div id="stab-env" class="sidebar-panel">
        <button class="btn-small env-add-btn" onclick="addEnvRow()">+ Add variable</button>
        <div id="env-list"></div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main>
      <!-- Request tabs bar -->
      <div class="req-tabbar" id="req-tabbar">
        <!-- tabs injected by JS -->
        <button class="req-tab-add" onclick="addRequestTab()" title="New tab">+</button>
      </div>

      <!-- Tab panels injected by JS -->
      <div id="req-panels"></div>
    </main>
  </div>

  <!-- Show-sidebar button (visible when sidebar hidden) -->
  <button id="sidebar-show" onclick="toggleSidebar()" title="Show sidebar" class="hidden">▶</button>
  <!-- Mobile backdrop -->
  <div id="sidebar-backdrop" class="sidebar-backdrop hidden" onclick="toggleSidebar()"></div>

  <!-- Missing vars dialog -->
  <div id="vars-dialog" class="dialog-backdrop hidden">
    <div class="dialog">
      <div class="dialog-title">Fill in missing values</div>
      <div class="dialog-subtitle">These will be saved to your environment for reuse.</div>
      <div id="vars-fields"></div>
      <div class="dialog-actions">
        <button class="btn-small" onclick="closeVarsDialog(false)">Skip</button>
        <button class="btn-primary" onclick="closeVarsDialog(true)">Save &amp; continue</button>
      </div>
    </div>
  </div>

  <!-- Save dialog -->
  <div id="save-dialog" class="dialog-backdrop hidden">
    <div class="dialog">
      <div class="dialog-title">Save Request</div>
      <input id="save-name" type="text" placeholder="Request name" />
      <div class="dialog-actions">
        <button class="btn-small" onclick="closeSaveDialog()">Cancel</button>
        <button class="btn-primary" onclick="confirmSave()">Save</button>
      </div>
    </div>
  </div>

  <!-- Import dialog -->
  <div id="import-dialog" class="dialog-backdrop hidden">
    <div class="dialog">
      <div class="dialog-title">Import requests</div>
      <div id="import-count" class="dialog-subtitle"></div>
      <input id="import-name" type="text" placeholder="Request name (for sidebar save)" />
      <div class="dialog-actions">
        <button class="btn-small" onclick="closeImportDialog(false)">Cancel</button>
        <button class="btn-small" onclick="closeImportDialog('tabs')">Open as tabs</button>
        <button class="btn-primary" onclick="closeImportDialog('sidebar')">Save to sidebar</button>
      </div>
    </div>
  </div>

  <!-- Confirm dialog (reusable) -->
  <div id="confirm-dialog" class="dialog-backdrop hidden">
    <div class="dialog">
      <div id="confirm-title" class="dialog-title">Are you sure?</div>
      <div id="confirm-msg" class="dialog-subtitle"></div>
      <div class="dialog-actions">
        <button class="btn-small" id="confirm-cancel">Cancel</button>
        <button class="btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <script src="command-parser.js?v=4"></script>
  <script src="app.js?v=28"></script>
  <script>
    document.getElementById('confirm-cancel').addEventListener('click', () => closeConfirm(false));
    document.getElementById('confirm-ok').addEventListener('click', () => closeConfirm(true));
  </script>
</body>
</html>
